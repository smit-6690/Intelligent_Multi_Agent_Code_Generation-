name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src/intellicode
      - run: pytest --cov=intellicode --cov-report=term-missing

  native-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure C++
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release
      - name: Build C++
        run: cmake --build cpp/build --parallel
      - name: Test C++
        run: ctest --test-dir cpp/build --output-on-failure
